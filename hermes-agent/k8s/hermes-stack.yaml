---
# Dedicated namespace for the agent
apiVersion: v1
kind: Namespace
metadata:
  name: cerebro

---
# Secret for the API keys — fill in with your values before applying
# kubectl create secret generic hermes-secrets -n cerebro \
#   --from-literal=ANTHROPIC_API_KEY="sk-ant-..."
# The Telegram token does NOT go here: it is handled by n8n, not Hermes.
apiVersion: v1
kind: Secret
metadata:
  name: hermes-secrets
  namespace: cerebro
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "REPLACE_ME"

---
# ConfigMap with non-secret configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
  namespace: cerebro
data:
  # Ollama runs LOCALLY on Sadida (host, not a pod). Reachable via Tailscale/MagicDNS.
  OLLAMA_URL: "http://sadida.stegosaurus-panga.ts.net:11434"
  WORKSPACE_ROOT: "/workspace"
  NODE_ENV: "production"
  PORT: "8080"
  # ── Capability toggles (default: locked down) ──────────────────────────────
  # Flip to "true" to grant a capability. Note: the pod securityContext below
  # drops ALL Linux capabilities and runs non-root, so unrestricted shell that
  # needs privileged actions may also require relaxing securityContext.
  HERMES_ALLOW_SSH: "false"                 # ssh/scp/sftp/rsync to cluster nodes
  HERMES_ALLOW_UNRESTRICTED_SHELL: "false"  # any command via bash -lc
  HERMES_SHELL_EXTRA: ""                    # extra binaries, e.g. "rm,mv,cp,tar"
  HERMES_FS_UNRESTRICTED: "false"           # read/write/delete outside /workspace
  HERMES_FS_ALLOW_WRITE_ANYWHERE: "false"
  HERMES_FS_ALLOW_DELETE: "false"
  # Local model used when Claude is unavailable (empty ANTHROPIC_API_KEY -> fallback).
  HERMES_CLAUDE_FALLBACK_MODEL: "qwen3.5:4b"

---
# PersistentVolumeClaim for the sandbox workspace
# Uses Aery's NFS as the storage backend
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-workspace-pvc
  namespace: cerebro
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-client   # adjust to the name of your NFS StorageClass
  resources:
    requests:
      storage: 10Gi

---
# MCP server Deployment — pinned to Ocra via nodeSelector
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-mcp
  namespace: cerebro
  labels:
    app: hermes-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-mcp
  template:
    metadata:
      labels:
        app: hermes-mcp
    spec:
      # Pin to Ocra — adjust the hostname if different
      nodeSelector:
        kubernetes.io/hostname: ocra

      # No access to the host network
      hostNetwork: false
      hostPID: false
      hostIPC: false

      containers:
        - name: hermes-mcp
          image: ghcr.io/your-user/hermes-mcp:latest
          # For local development without a registry:
          # image: hermes-mcp:local
          # imagePullPolicy: Never

          imagePullPolicy: Always

          envFrom:
            - configMapRef:
                name: hermes-config
          env:
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-secrets
                  key: ANTHROPIC_API_KEY

          ports:
            - containerPort: 8080
              name: http

          # ── Security sandbox ─────────────────────────────────────────────
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # false for /tmp and npm cache
            capabilities:
              drop:
                - ALL
              # Do NOT add capabilities — if a tool needs NET_RAW, use it via curl
            seccompProfile:
              type: RuntimeDefault

          # ── Resources ────────────────────────────────────────────────────
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"

          # ── Volumes ──────────────────────────────────────────────────────
          volumeMounts:
            # Main workspace — controlled read/write
            - name: workspace
              mountPath: /workspace

            # /tmp writable for tools that need it
            - name: tmp
              mountPath: /tmp

          # ── Health checks ─────────────────────────────────────────────────
          # The HTTP gateway exposes /health on :8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15

      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: hermes-workspace-pvc
        - name: tmp
          emptyDir: {}

      # Always restart if the process dies
      restartPolicy: Always

---
# Internal cluster Service so n8n and other pods can reach it
apiVersion: v1
kind: Service
metadata:
  name: hermes-mcp-svc
  namespace: cerebro
spec:
  selector:
    app: hermes-mcp
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP

# ─────────────────────────────────────────────────────────────────────────────
# NOTE: Ollama is NOT deployed in the cluster.
# It runs locally on Sadida (host, the only node with a discrete GPU, RTX 3050).
# Hermes reaches it via the ConfigMap's OLLAMA_URL (Sadida's Tailscale MagicDNS).
# Models are installed directly on Sadida:
#   ollama pull qwen3:1.7b
#   ollama pull qwen3.5:4b
# ─────────────────────────────────────────────────────────────────────────────
